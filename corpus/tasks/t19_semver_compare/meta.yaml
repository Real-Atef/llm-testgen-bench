id: t19_semver_compare
title: Compare semantic versions numerically
difficulty: 2
failure_class: parsing_validation
entrypoint: compare_semver
description: >
  Compare two dotted numeric versions component-by-component, returning the sign
  of the comparison. The '1.10.0 vs 1.9.0' case is the one that catches a
  lexicographic (string) comparison bug.
golden_cases:
  - args: ["1.2.3", "1.2.4"]
    expected: -1
  - args: ["2.0.0", "1.9.9"]
    expected: 1
  - args: ["1.0.0", "1.0.0"]
    expected: 0
  - args: ["1.10.0", "1.9.0"]
    expected: 1
  - args: ["1.2", "1.2.3"]
    raises: ValueError
  - args: ["1.2.x", "1.2.3"]
    raises: ValueError
  - args: ["1.0.0", "2.0.x"]
    raises: ValueError
    note: >
      invalid component in b must be rejected even though index 0 already
      decides the order (regression from the adversarial corpus audit)
