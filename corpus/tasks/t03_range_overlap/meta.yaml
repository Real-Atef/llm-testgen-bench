id: t03_range_overlap
title: Overlap length of two half-open intervals
difficulty: 2
failure_class: off_by_one
entrypoint: overlap_length
description: >
  Compute the length of the intersection of two half-open intervals. Touching
  endpoints (e.g. [0,5) and [5,10)) overlap by zero, which is the inclusive-vs-
  exclusive bound trap.
golden_cases:
  - args: [0, 5, 3, 8]
    expected: 2
  - args: [0, 5, 5, 10]
    expected: 0
  - args: [0, 10, 2, 4]
    expected: 2
  - args: [0, 3, 5, 8]
    expected: 0
  - args: [0, 0, 0, 0]
    expected: 0
  - args: [-5, 5, -2, 2]
    expected: 4
